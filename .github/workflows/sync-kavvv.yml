# ============================================================
# DODEKA SPORT – KAVVV Auto-Sync Workflow
# Scrapes uitslagen.vriendenclubsantwerpen.be every Saturday
# at 18:00 Brussels time (16:00 UTC in summer / CEST).
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SUPABASE_URL             – your project URL
#   SUPABASE_SERVICE_ROLE_KEY – service role key (NOT the anon key!)
# ============================================================

name: Sync KAVVV Data

on:
  schedule:
    - cron: '0 16 * * 6'   # Every Saturday at 16:00 UTC = 18:00 Brussels (CEST, summer)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 supabase

      - name: Run KAVVV scraper
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/sync_kavvv.py
