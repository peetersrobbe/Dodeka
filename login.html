<section class="py-5">
  <div class="container">
    <div class="login-card">
      <div class="text-center mb-4">
        <img src="Afbeeldingen/Logo met kantjes klein.png" alt="Dodeka" height="60">
        <h4 class="mt-3">Dodeka Sport</h4>
        <p id="page-subtitle" class="text-muted small">Log in om de statistieken te bekijken.</p>
      </div>

      <div id="msg" class="alert" role="alert"></div>

      <!-- ── Normal login form ── -->
      <div id="login-section">
        <div class="border rounded p-4 bg-white shadow-sm">
          <form id="login-form">
            <div class="mb-3">
              <label class="form-label">E-mailadres</label>
              <input type="email" class="form-control" id="login-email" required placeholder="jouw@email.com">
            </div>
            <div class="mb-3">
              <label class="form-label">Wachtwoord</label>
              <div class="input-group">
                <input type="password" class="form-control" id="login-password" required placeholder="••••••••">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePw('login-password')">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <small><a href="#" onclick="sendReset()" class="text-muted">Wachtwoord vergeten?</a></small>
            </div>
            <button type="submit" class="btn btn-dodeka w-100" id="login-btn">
              <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
              Inloggen
            </button>
          </form>
        </div>
      </div>

      <!-- ── Set-password form (invite & password-reset) ── -->
      <div id="set-password-section" style="display:none;">
        <div class="border rounded p-4 bg-white shadow-sm">
          <form id="set-password-form">
            <div class="mb-3">
              <label class="form-label">Nieuw wachtwoord</label>
              <div class="input-group">
                <input type="password" class="form-control" id="set-pw-new"
                       required placeholder="••••••••" minlength="6">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePw('set-pw-new')">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Herhaal wachtwoord</label>
              <div class="input-group">
                <input type="password" class="form-control" id="set-pw-confirm"
                       required placeholder="••••••••" minlength="6">
                <button class="btn btn-outline-secondary" type="button" onclick="togglePw('set-pw-confirm')">
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </div>
            <button type="submit" class="btn btn-dodeka w-100" id="set-pw-btn">
              <span id="set-pw-spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
              Wachtwoord instellen
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"

        crossorigin="anonymous"></script>

<!-- Capture the auth token type NOW — before Supabase loads and wipes the hash -->
<script>
  window._preAuthType = new URLSearchParams(window.location.hash.slice(1)).get('type');
</script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-config.js"></script>
<script>
// _preAuthType was saved above before Supabase cleared the URL hash.
// Values: 'invite' | 'recovery' | null
const _authType   = window._preAuthType;
const _isCallback = _authType === 'invite' || _authType === 'recovery';

// ── Show the right form immediately ───────────────────────────
function showSetPwSection(type) {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('set-password-section').style.display = 'block';
  document.getElementById('page-subtitle').textContent =
    type === 'invite'
      ? 'Welkom! Stel hieronder je wachtwoord in.'
      : 'Stel je nieuwe wachtwoord in.';
}

if (_isCallback) {
  showSetPwSection(_authType);
}

// ── Auth state changes (robust fallback + recovery event) ─────
supabaseClient.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Supabase fires this specifically for password-reset links
    showSetPwSection('recovery');
  } else if (event === 'SIGNED_IN' && _authType === 'invite') {
    // Invite token was just processed — make sure the set-pw form is visible
    showSetPwSection('invite');
  } else if (event === 'SIGNED_IN' && !_isCallback) {
    // Normal sign-in completed (from the login form submit)
    window.location.href = 'statistieken.html';
  }
});

// ── Normal visit: redirect if already logged in ───────────────
if (!_isCallback) {
  supabaseClient.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'statistieken.html';
  });
}

// ── Login ──────────────────────────────────────────────────────
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  setLoading('login', true);
  const { error } = await supabaseClient.auth.signInWithPassword({
    email:    document.getElementById('login-email').value.trim(),
    password: document.getElementById('login-password').value,
  });
  setLoading('login', false);
  if (error) showMsg(error.message, 'danger');
  else window.location.href = 'statistieken.html';
});

// ── Set new password (invite / recovery) ──────────────────────
document.getElementById('set-password-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const pw  = document.getElementById('set-pw-new').value;
  const pw2 = document.getElementById('set-pw-confirm').value;
  if (pw !== pw2) { showMsg('Wachtwoorden komen niet overeen.', 'danger'); return; }
  if (pw.length < 6) { showMsg('Wachtwoord moet minstens 6 tekens lang zijn.', 'warning'); return; }

  setLoading('set-pw', true);
  const { error } = await supabaseClient.auth.updateUser({ password: pw });
  setLoading('set-pw', false);

  if (error) showMsg(error.message, 'danger');
  else window.location.href = 'statistieken.html';
});

// ── Password reset request ─────────────────────────────────────
async function sendReset() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('Vul eerst je e-mailadres in.', 'warning'); return; }
  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/login.html'
  });
  if (error) showMsg(error.message, 'danger');
  else showMsg('Resetlink verstuurd naar ' + email, 'success');
}

// ── Helpers ────────────────────────────────────────────────────
function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.className = `alert alert-${type}`;
  el.textContent = text;
  el.style.display = 'block';
}

function setLoading(prefix, on) {
  const btn     = document.getElementById(`${prefix}-btn`);
  const spinner = document.getElementById(`${prefix}-spinner`);
  if (btn)     btn.disabled = on;
  if (spinner) spinner.classList.toggle('d-none', !on);
}

function togglePw(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
